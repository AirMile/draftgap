    <!-- Modal for add/edit -->
    <div class="modal-overlay" id="modal">

        <label for="field-name">Naam</label>
        <input type="text" id="field-name" placeholder="feature-naam" />

        <label for="field-desc">Beschrijving</label>
        <textarea id="field-desc" placeholder="Korte beschrijving"></textarea>

        <div class="modal-row">
          <div>
            <label for="field-type">Type</label>
            <select id="field-type">
              <option value="FEATURE">FEATURE</option>
              <option value="API">API</option>
              <option value="INTEGRATION">INTEGRATION</option>
              <option value="UI">UI</option>
              <option value="REFACTOR">REFACTOR</option>

              <option value="COMPONENT">COMPONENT</option>

              <option value="A11Y">A11Y</option>
              <option value="PERF">PERF</option>
              <option value="PAGE-GAP">PAGE-GAP</option>
            </select>
          </div>
          <div>
            <label for="field-phase">Prioriteit</label>
            <select id="field-phase">
              <option value="P1">P1</option>
              <option value="P2">P2</option>
              <option value="P3">P3</option>
              <option value="P4">P4</option>
            </select>
          </div>
        </div>

        <label for="field-dep">Dependency (optioneel)</label>

    <!-- Toast notification -->

    <script>
      // ─── State ──────────────────────────────────────────────
      const fileRaw = document.getElementById("backlog-data").textContent;
      let data = JSON.parse(fileRaw);
      if (!data.features) data.features = [];

      const STATUSES = ["TODO", "DOING", "DONE"];
      const STATUS_COLORS = {
        TODO: "var(--todo)",
        DOING: "var(--doing)",
        DONE: "var(--done)",
      };
      const PHASE_LABELS = {
        P1: "P1",
        P2: "P2",
        P3: "P3",
        P4: "P4",
        P4: "P4 · Maybe",
      };
      const PHASE_CLASSES = {
        P1: "phase-p1",
        P2: "phase-p2",
        P3: "phase-p3",
        P4: "phase-p4",
      };

      // ─── Helpers ────────────────────────────────────────────
      function getAllItems() {
        return data.features.map((f, i) => ({
          ...f,
          _list: "features",
          _idx: i,
          phaseKey: f.phase || "P1",
        }));
      }

      function findItem(name) {
        const item = data.features.find((f) => f.name === name);
        if (item) return { item, list: "features" };
        return null;
      }

      function removeItem(name) {
        const fi = data.features.findIndex((f) => f.name === name);
        if (fi !== -1) data.features.splice(fi, 1);
      }

      const FRONTEND_TYPES = [
        "PAGE",
        "COMPONENT",
        "THEME",
        "A11Y",
        "PERF",
        "PAGE-GAP",
      ];

      function updateStatus(name, newStatus, newStage) {
        const found = findItem(name);
        if (!found) return;
        found.item.status = newStatus;
        if (newStatus === "DOING") {
          const isFrontend = FRONTEND_TYPES.includes(found.item.type);
          found.item.stage =
            newStage ||
            found.item.stage ||
            (isFrontend ? "building" : "defining");
        } else {
          delete found.item.stage;
          if (newStatus === "DONE") {
            found.item.date = new Date().toISOString().slice(0, 10);
          }
        }
      }

      function syncJSON() {
        data.updated = new Date().toISOString().slice(0, 10);
        // Update DOM
        const el = document.getElementById("backlog-data");
        el.textContent = "\n" + JSON.stringify(data, null, 2) + "\n";
        // Auto-save to server → writes to disk
        saveToDisk();
      }

      // Detect save URL: /{project}/save when served by backlog server
      const SAVE_URL = (() => {
        const p = location.pathname.replace(/\/+$/, "");
        return p ? p + "/save" : "/save";
      })();

      let saveTimer = null;
      function saveToDisk() {
        // Debounce: wait 300ms after last change before saving
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          try {
            const res = await fetch(SAVE_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
            if (!res.ok) throw new Error("save failed");
          } catch {
            toast("Server niet bereikbaar — start: node serve-backlog.js");
          }
        }, 300);
      }

      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("visible");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("visible"), 2000);
      }

      function openInVSCode(url, el) {
        const orig = el.style.color;
        el.style.color = "var(--text-dim)";
        fetch(url, { method: "POST" })
          .then((r) => r.json())
          .then((d) => {
            if (d.ok) {
              el.style.color = "var(--done)";
              setTimeout(() => (el.style.color = orig), 1000);
            } else {
              el.style.color = "var(--danger)";
              toast("Fout: " + (d.error || "onbekend"));
              setTimeout(() => (el.style.color = orig), 2000);
            }
          })
          .catch(() => {
            el.style.color = "var(--danger)";
            toast("Kon VS Code niet bereiken");
            setTimeout(() => (el.style.color = orig), 2000);
          });
      }

      // ─── Next skill helper ────────────────────────────────────
      function getNextSkill(f) {
        const isFrontend = FRONTEND_TYPES.includes(f.type);
        if (f.status === "TODO") return isFrontend ? "compose" : "define";
        if (f.status === "DOING") {
          return (
            {
              defining: "define",
              defined: isFrontend ? "compose" : "build",
              building: isFrontend ? "compose" : "build",
              built: isFrontend ? "audit" : "test",
              testing: isFrontend ? "audit" : "test",
            }[f.stage] || (isFrontend ? "compose" : "define")
          );
        }
        return null;
      }

      // ─── Render ─────────────────────────────────────────────
      function render() {
        // Clear
        document.querySelectorAll(".board").forEach((el) => el.remove());

        const all = getAllItems();

        // Board
        const board = document.createElement("div");
        board.className = "board";

        STATUSES.forEach((status) => {
          const col = document.createElement("div");
          col.className = "column";
          col.dataset.status = status;

          const items = all.filter((f) => f.status === status);

          col.innerHTML = `
            <div class="column-header">
              <span class="indicator" style="background:${STATUS_COLORS[status]}"></span>
              <h2>${status}</h2>
              <span class="count">${items.length}</span>
              <button class="add-btn" title="Card toevoegen" data-status="${status}">+</button>
            </div>
          `;

          const cards = document.createElement("div");
          cards.className = "cards";
          cards.dataset.status = status;

          // Drop zone events
          cards.addEventListener("dragover", handleDragOver);
          cards.addEventListener("dragleave", handleDragLeave);
          cards.addEventListener("drop", handleDrop);

          items.forEach((f) => {
            cards.appendChild(createCard(f));
          });

          col.appendChild(cards);
          board.appendChild(col);
        });

        document.body.appendChild(board);

        // Wire add buttons
        document.querySelectorAll(".add-btn").forEach((btn) => {
          btn.addEventListener("click", () => openAddModal(btn.dataset.status));
        });
      }

      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function createCard(f) {
        const typeClass = "badge-" + f.type.toLowerCase().replace("_", "-");
        const phaseClass = PHASE_CLASSES[f.phaseKey] || "phase-p4";
        const phaseLabel = PHASE_LABELS[f.phaseKey] || "P4";

        let depTag = "";
        if (f.dependency) {
          const depFound = findItem(f.dependency);
          const depResolved = depFound && depFound.item.status === "DONE";
          if (!depResolved)
            depTag = `<span class="card-dep"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4 7V5a4 4 0 118 0v2h1a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V8a1 1 0 011-1h1zm2 0h4V5a2 2 0 10-4 0v2z"/></svg> ${esc(f.dependency)}</span>`;
        }

        let extra = "";
        if (f.source)
          extra += `<div class="card-source">${esc(f.source)}</div>`;
        if (f.date && f.status === "DONE")
          extra += `<div class="card-date">${esc(f.date)}</div>`;
        if (f.assignee)
          extra += `<div class="card-assignee"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg> ${esc(f.assignee)}</div>`;
        const stageTag =
          f.status === "DOING" && f.stage
            ? `<span class="stage-badge stage-${f.stage}">${esc(f.stage)}</span>`
            : "";

        const isFE = FRONTEND_TYPES.includes(f.type);
        const prefix = isFE
          ? "frontend"
          : data.source && data.source.startsWith("/game")
            ? "game"
            : "dev";
        const nextVerb = getNextSkill(f);
        const nextCmd = nextVerb ? `/${prefix}-${nextVerb} ${f.name}` : "";

        const card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.dataset.name = f.name;
        card.innerHTML = `
          <div class="card-top">
            <span class="card-name">${esc(f.name)}</span>
            <div class="card-actions"></div>
          </div>
          <div class="card-desc">${esc(f.description)}</div>
          <div class="card-tags">
            <span class="phase-tag ${phaseClass}">${phaseLabel}</span>
            <span class="badge ${typeClass}">${esc(f.type)}</span>
            ${stageTag}
            ${depTag}
          </div>
          ${extra}
        `;

        // Drag events
        card.addEventListener("dragstart", handleDragStart);
        card.addEventListener("dragend", handleDragEnd);

        // Click card to open detail modal
        card.style.cursor = "pointer";
        card.addEventListener("click", () => {
          openDetailModal(f.name);
        });

        return card;
      }

      // ─── Drag & Drop ───────────────────────────────────────
      let dragEl = null;
      let dragName = null;
      let dragOrigStatus = null;
      let dropSucceeded = false;

      function handleDragStart(e) {
        dragEl = this;
        dragName = this.dataset.name;
        const found = findItem(dragName);
        dragOrigStatus = found ? found.item.status : null;
        dropSucceeded = false;
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", dragName);
        // Delay ghost class so browser captures drag image first
        setTimeout(() => this.classList.add("ghost"), 0);
      }

      function handleDragEnd() {
        if (!dragEl) return;
        dragEl.classList.remove("ghost");

        if (dropSucceeded) {
          // Sync DOM order back to data.features
          const newOrder = [];
          document.querySelectorAll(".cards").forEach((container) => {
            container.querySelectorAll(".card").forEach((card) => {
              const item = data.features.find(
                (f) => f.name === card.dataset.name,
              );
              if (item) newOrder.push(item);
            });
          });
          data.features.forEach((f) => {
            if (!newOrder.find((n) => n.name === f.name)) newOrder.push(f);
          });
          data.features = newOrder;
          syncJSON();

          const found = findItem(dragName);
          const newStatus = found ? found.item.status : null;
          if (dragOrigStatus !== newStatus) {
            toast(`${dragName}: ${dragOrigStatus} \u2192 ${newStatus}`);
          } else {
            toast(`${dragName} verplaatst`);
          }
        }

        // Always re-render to clean state
        render();
        dropSucceeded = false;
        dragEl = null;
        dragName = null;
        dragOrigStatus = null;
      }

      function getClosestCard(container, y) {
        const cards = [...container.querySelectorAll(".card:not(.ghost)")];
        let closest = null;
        let closestOffset = Number.NEGATIVE_INFINITY;
        for (const card of cards) {
          const rect = card.getBoundingClientRect();
          const offset = y - rect.top - rect.height / 2;
          if (offset < 0 && offset > closestOffset) {
            closestOffset = offset;
            closest = card;
          }
        }
        return closest;
      }

      function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        if (!dragEl) return;
        const closest = getClosestCard(this, e.clientY);
        if (closest) {
          this.insertBefore(dragEl, closest);
        } else {
          this.appendChild(dragEl);
        }
      }

      function handleDragLeave() {}

      function handleDrop(e) {
        e.preventDefault();
        dropSucceeded = true;
        if (!dragEl || !dragName) return;

        const newStatus = this.dataset.status;
        const found = findItem(dragName);
        if (!found) return;

        // Update status for cross-column moves
        if (found.item.status !== newStatus) {
          if (newStatus === "DOING") {
            const isFEDrag = FRONTEND_TYPES.includes(found.item.type);
            updateStatus(
              dragName,
              newStatus,
              found.item.stage || (isFEDrag ? "building" : "defining"),
            );
          } else {
            updateStatus(dragName, newStatus);
          }
        }
      }

      // ─── Modal: Add / Edit ─────────────────────────────────
      let editingName = null;
      let addToStatus = null;

      function openAddModal(status) {
        editingName = null;
        addToStatus = status;
        document.getElementById("modal-title").textContent = "Card toevoegen";
        document.getElementById("field-name").value = "";
        document.getElementById("field-desc").value = "";
        document.getElementById("field-type").value = "FEATURE";
        document.getElementById("field-phase").value = "P1";
        document.getElementById("field-dep").value = "";
        document.getElementById("field-assignee").value = "";
        document.getElementById("field-name").disabled = false;
        document.getElementById("modal-save").textContent = "Toevoegen";
        document.getElementById("modal").classList.add("active");
        document.getElementById("field-name").focus();
      }

      function openEditModal(name) {
        const found = findItem(name);
        if (!found) return;

        editingName = name;
        addToStatus = null;
        document.getElementById("modal-title").textContent = "Card bewerken";
        document.getElementById("field-name").value = found.item.name;
        document.getElementById("field-desc").value =
          found.item.description || "";
        document.getElementById("field-type").value = found.item.type;
        document.getElementById("field-phase").value = found.item.phase || "P1";
        document.getElementById("field-dep").value =
          found.item.dependency || "";
        document.getElementById("field-assignee").value =
          found.item.assignee || "";
        document.getElementById("field-name").disabled = false;
        document.getElementById("modal-save").textContent = "Opslaan";
        document.getElementById("modal").classList.add("active");
        document.getElementById("field-name").focus();
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("active");
        editingName = null;
        addToStatus = null;
      }

      document.getElementById("modal-save").addEventListener("click", () => {
        const name = document.getElementById("field-name").value.trim();
        const desc = document.getElementById("field-desc").value.trim();
        const type = document.getElementById("field-type").value;
        const phase = document.getElementById("field-phase").value;
        const dep = document.getElementById("field-dep").value.trim() || null;
        const assignee =
          document.getElementById("field-assignee").value.trim() || null;

        if (!name) return;

        if (editingName) {
          // Edit existing
          const found = findItem(editingName);
          if (!found) return;

          found.item.name = name;
          found.item.description = desc;
          found.item.type = type;
          found.item.phase = phase;
          found.item.dependency = dep;
          found.item.assignee = assignee;

          toast(`${name} bijgewerkt`);
        } else {
          // Add new
          data.features.push({
            name,
            type,
            status: addToStatus || "TODO",
            phase,
            description: desc,
            dependency: dep,
            assignee,
          });

          toast(`${name} toegevoegd`);
        }

        syncJSON();
        closeModal();
        render();
      });

      // Enter key saves modal
      document.getElementById("modal").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
          e.preventDefault();
          document.getElementById("modal-save").click();
        }
        if (e.key === "Escape") closeModal();
      });

      // ─── Modal: Delete ─────────────────────────────────────
      let deletingName = null;

      function openDeleteModal(name) {
        deletingName = name;
        document.getElementById("delete-name").textContent = name;
        document.getElementById("delete-modal").classList.add("active");
      }

      function closeDeleteModal() {
        document.getElementById("delete-modal").classList.remove("active");
        deletingName = null;
      }

      document
        .getElementById("delete-confirm")
        .addEventListener("click", () => {
          if (!deletingName) return;
          const name = deletingName;
          removeItem(name);
          syncJSON();
          closeDeleteModal();
          render();
          toast(`${name} verwijderd`);
        });

      document
        .getElementById("delete-modal")
        .addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeDeleteModal();
          if (e.key === "Enter") {
            e.preventDefault();
            document.getElementById("delete-confirm").click();
          }
        });

      // ─── Detail Modal ────────────────────────────────────────
      let detailName = null;
      const featureDetailCache = {};

      function md(s) {
        if (!s) return "";
        try {
          return marked.parse(s);
        } catch {
          return esc(s);
        }
      }

      async function fetchFeatureDetail(name) {
        const el = document.getElementById("detail-feature-data");
        if (!el) return;

        let detail = featureDetailCache[name];
        if (!detail) {
          const basePath = location.pathname
            .replace(/\/backlog\/?$/, "")
            .replace(/\/+$/, "");
          const url = basePath + "/feature/" + encodeURIComponent(name);
          try {
            const res = await fetch(url);
            if (res.ok) {
              detail = await res.json();
              featureDetailCache[name] = detail;
            }
          } catch {}
        }

        if (
          !detail ||
          (!detail.requirements &&
            !detail.build &&
            !detail.tests &&
            !detail.summary)
        ) {
          el.innerHTML = "";
          return;
        }

        el.innerHTML = renderFeatureDetail(detail);
      }

      function renderFeatureDetail(d) {
        let html = "";

        // Summary + explanation
        const summary = d.summary || "";
        const explanation =
          d.build && d.build.explanation ? d.build.explanation : "";
        if (summary || explanation) {
          html += `<div class="fd-section"><div class="fd-summary">`;
          if (summary) html += `<p>${esc(summary)}</p>`;
          if (explanation)
            html += `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${md(explanation)}</div>`;
          html += `</div></div>`;
        }

        // Files
        const files = d.files || [];
        if (files.length) {
          const icons = { create: "+", modify: "~" };
          const colors = {
            create: "var(--done)",
            modify: "var(--accent)",
          };
          html += `<div class="fd-section"><h4>Files (${files.length})</h4><div class="fd-files">`;
          files.forEach((f) => {
            const basePath = location.pathname.replace(/\/backlog\/?$/, "");
            const openUrl =
              basePath +
              "/open/" +
              encodeURIComponent(f.path).replace(/%2F/g, "/");
            html += `<div class="fd-file">
              <span class="fd-file-icon" style="color:${colors[f.action] || "var(--text-dim)"}">${icons[f.action] || "?"}</span>
              <a class="fd-file-path" href="#" onclick="openInVSCode('${openUrl}',this);return false" title="Open in VS Code">${esc(f.path)}</a>
              <span class="fd-file-purpose">${esc(f.purpose || "")}</span>
            </div>`;
          });
          html += `</div></div>`;
        }

        // Requirements
        const reqs = d.requirements || [];
        if (reqs.length) {
          const hasBuild = reqs.some((r) => r.technique);
          const hasStatus = reqs.some(
            (r) => r.status && r.status !== "pending",
          );
          let headers = "<th>ID</th><th>Beschrijving</th><th>Cat</th>";
          if (hasBuild) headers += "<th>Techniek</th>";
          if (hasStatus) headers += "<th>Status</th>";
          const rows = reqs
            .map((r) => {
              let row = `<td><code>${esc(r.id)}</code></td><td>${esc(r.description)}</td><td style="color:var(--text-dim)">${esc(r.category || "")}</td>`;
              if (hasBuild) row += `<td>${esc(r.technique || "")}</td>`;
              if (hasStatus) {
                const sc =
                  r.status === "PASS"
                    ? "var(--done)"
                    : r.status === "FAIL"
                      ? "var(--danger)"
                      : "var(--text-dim)";
                row += `<td><span style="color:${sc};font-weight:600">${esc((r.status || "pending").toUpperCase())}</span></td>`;
              }
              return `<tr>${row}</tr>`;
            })
            .join("");
          html += `<div class="fd-section"><h4>Requirements (${reqs.length})</h4>
            <table class="fd-table"><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        // Build
        if (d.build) {
          const b = d.build;
          html += `<div class="fd-section"><h4>Build</h4><div class="fd-stat-row">
            <div class="fd-stat"><div class="fd-stat-label">Tests</div><div class="fd-stat-value">${b.testsPass || 0}/${b.testsTotal || 0}</div></div>
            ${b.techniques ? `<div class="fd-stat"><div class="fd-stat-label">TDD / Impl</div><div class="fd-stat-value">${b.techniques.tdd || 0} / ${b.techniques.implementationFirst || b.techniques["implementation-first"] || 0}</div></div>` : ""}
          </div>`;
          if (b.decisions && b.decisions.length) {
            html += `<ul style="padding-left:16px;font-size:12px;color:var(--text-muted)">${b.decisions.map((dec) => `<li style="margin-bottom:3px">${esc(dec)}</li>`).join("")}</ul>`;
          }
          html += `</div>`;
        }

        // Tests
        if (d.tests) {
          const t = d.tests;
          const status = t.finalStatus || "UNKNOWN";
          const sc = ["PASSED", "VERIFIED", "PASS"].includes(status)
            ? "var(--done)"
            : "var(--danger)";
          html += `<div class="fd-section"><h4>Tests</h4><div class="fd-stat-row">
            <span style="font-size:14px;font-weight:700;color:${sc}">${esc(status)}</span>
            ${t.coverage ? `<div class="fd-stat"><div class="fd-stat-label">Stmts</div><div class="fd-stat-value">${t.coverage.statements || 0}%</div></div><div class="fd-stat"><div class="fd-stat-label">Branch</div><div class="fd-stat-value">${t.coverage.branches || 0}%</div></div>` : ""}
          </div>`;
          if (t.checklist && t.checklist.length) {
            html += `<table class="fd-table"><thead><tr><th>#</th><th>Test</th><th>Status</th></tr></thead>
              <tbody>${t.checklist
                .map((item) => {
                  const tc =
                    item.status === "PASS" || item.status === "pass"
                      ? "var(--done)"
                      : item.status === "FAIL" || item.status === "fail"
                        ? "var(--danger)"
                        : "var(--text-dim)";
                  return `<tr><td>${item.id}</td><td>${esc(item.title)}</td><td><span style="color:${tc};font-weight:600">${esc((item.status || "pending").toUpperCase())}</span></td></tr>`;
                })
                .join("")}</tbody></table>`;
          }
          html += `</div>`;
        }

        // Refactor
        if (d.refactor) {
          const r = d.refactor;
          const rc =
            {
              CLEAN: "var(--done)",
              REFACTORED: "var(--accent)",
              ROLLED_BACK: "var(--danger)",
            }[r.status] || "var(--text-muted)";
          html += `<div class="fd-section"><h4>Refactor</h4>
            <span style="font-size:14px;font-weight:700;color:${rc}">${esc(r.status)}</span>`;
          const cats = {
            security: "Security",
            performance: "Performance",
            dry: "DRY",
            simplification: "Simplificatie",
            clarity: "Leesbaarheid",
            quality: "Quality",
            errorHandling: "Error Handling",
          };
          const imp = r.improvements || {};
          Object.keys(cats)
            .filter((k) => imp[k] && imp[k].length)
            .forEach((cat) => {
              html += `<div style="margin-top:8px"><span style="font-size:11px;font-weight:600;color:var(--text-muted)">${cats[cat]}</span>`;
              imp[cat].forEach((item) => {
                html += `<div style="padding:2px 0;font-size:12px"><code>${esc(item.file)}:${item.line}</code> ${esc(item.issue)} → ${esc(item.fix)}</div>`;
              });
              html += `</div>`;
            });
          html += `</div>`;
        }

        return html;
      }

      function openDetailModal(name) {
        const found = findItem(name);
        if (!found) return;
        detailName = name;
        const f = found.item;
        const phaseLabel = PHASE_LABELS[f.phase] || f.phase || "—";

        document.getElementById("detail-title").textContent = f.name;

        let html = "";
        if (f.description) {
          html += `<div class="detail-field"><div class="detail-label">Beschrijving</div><div class="detail-value">${esc(f.description)}</div></div>`;
        }
        html += `<div class="detail-field"><div class="detail-tags">`;
        html += `<span class="phase-tag ${PHASE_CLASSES[f.phase] || "phase-p4"}">${phaseLabel}</span>`;
        html += `<span class="badge badge-${f.type.toLowerCase().replace("_", "-")}">${esc(f.type)}</span>`;
        html += `<span class="status-tag" style="color:${STATUS_COLORS[f.status]}">${f.status}</span>`;
        if (f.status === "DOING" && f.stage)
          html += `<span class="stage-badge stage-${f.stage}">${esc(f.stage)}</span>`;
        html += `</div></div>`;
        if (f.dependency) {
          html += `<div class="detail-field"><div class="detail-label">Dependency</div><div class="detail-value">${esc(f.dependency)}</div></div>`;
        }
        if (f.assignee) {
          html += `<div class="detail-field"><div class="detail-label">Toegewezen aan</div><div class="detail-value">${esc(f.assignee)}</div></div>`;
        }
        if (f.source) {
          html += `<div class="detail-field"><div class="detail-label">Bron</div><div class="detail-value">${esc(f.source)}</div></div>`;
        }
        if (f.date) {
          html += `<div class="detail-field"><div class="detail-label">Datum</div><div class="detail-value">${esc(f.date)}</div></div>`;
        }

        document.getElementById("detail-body").innerHTML = html;

        // Show copy button if there's a next skill
        const isFEDetail = FRONTEND_TYPES.includes(f.type);
        const prefix = isFEDetail
          ? "frontend"
          : data.source && data.source.startsWith("/game")
            ? "game"
            : "dev";
        const verb = getNextSkill(f);
        const copyBtn = document.getElementById("detail-copy");
        if (f.assignee) {
          // Teammate: show brief button
          copyBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M5 11H3.5A1.5 1.5 0 012 9.5v-7A1.5 1.5 0 013.5 1h7A1.5 1.5 0 0112 2.5V5"/></svg> Brief`;
          copyBtn.title = `Kopieer task brief voor ${f.assignee}`;
          copyBtn.dataset.cmd = "";
          copyBtn.dataset.assignee = f.assignee;
          copyBtn.dataset.feature = f.name;
          copyBtn.style.display = "";
        } else if (verb) {
          const cmd = `/${prefix}-${verb} ${f.name}`;
          copyBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M5 11H3.5A1.5 1.5 0 012 9.5v-7A1.5 1.5 0 013.5 1h7A1.5 1.5 0 0112 2.5V5"/></svg> Kopieer`;
          copyBtn.title = cmd;
          copyBtn.dataset.cmd = cmd;
          copyBtn.dataset.assignee = "";
          copyBtn.dataset.feature = "";
          copyBtn.style.display = "";
        } else {
          copyBtn.style.display = "none";
        }

        // Clear and load feature detail
        document.getElementById("detail-feature-data").innerHTML = "";
        document.getElementById("detail-modal").classList.add("active");
        fetchFeatureDetail(name);
      }

      function closeDetailModal() {
        document.getElementById("detail-modal").classList.remove("active");
        detailName = null;
      }

      document.getElementById("detail-copy").addEventListener("click", () => {
        const btn = document.getElementById("detail-copy");
        if (btn.dataset.assignee) {
          const name = btn.dataset.feature;
          const found = findItem(name);
          if (found && typeof generateTaskBrief === "function") {
            generateTaskBrief(found.item).then((brief) => {
              navigator.clipboard.writeText(brief).then(() => {
                toast("Task brief gekopieerd");
              });
            });
          }
        } else {
          const cmd = btn.dataset.cmd;
          if (cmd) {
            navigator.clipboard.writeText(cmd).then(() => {
              toast(`Gekopieerd: ${cmd}`);
            });
          }
        }
      });

      document.getElementById("detail-edit").addEventListener("click", () => {
        const name = detailName;
        closeDetailModal();
        if (name) openEditModal(name);
      });

      document.getElementById("detail-delete").addEventListener("click", () => {
        const name = detailName;
        closeDetailModal();
        if (name) openDeleteModal(name);
      });

      document
        .getElementById("detail-modal")
        .addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeDetailModal();
        });

      // Close modals on overlay click
      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal")) closeModal();
      });
      document.getElementById("delete-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("delete-modal"))
          closeDeleteModal();
      });
      document.getElementById("detail-modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("detail-modal"))
          closeDetailModal();
      });

      // ─── Init ───────────────────────────────────────────────
      render();
    </script>
  </body>
</html>
