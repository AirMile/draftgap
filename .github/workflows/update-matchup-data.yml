name: Update matchup data

on:
  schedule:
    # Maandag en donderdag om 08:00 UTC (10:00 CEST)
    - cron: "0 8 * * 1,4"
  workflow_dispatch: # Handmatige trigger via GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate matchup data
        run: npm run generate-data

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Validate data size
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Check that no matchup JSON is under 10KB (healthy files are 100KB+)
          SMALL_FILES=$(find data/matchups -name '*.json' -size -10k | wc -l)
          if [ "$SMALL_FILES" -gt 0 ]; then
            echo "✗ Found $SMALL_FILES matchup files under 10KB — data likely incomplete"
            find data/matchups -name '*.json' -size -10k -exec ls -lh {} \;
            exit 1
          fi
          echo "✓ All matchup files are ≥10KB"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: update matchup data $(date -u +%Y-%m-%d)"
          git push
